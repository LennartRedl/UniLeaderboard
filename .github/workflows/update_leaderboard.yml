name: Update Leaderboard

on:
  schedule:
    # Runs every 5 minutes. GitHub's actual scheduler has ~1-2 min jitter.
    # On competition day this keeps the page fresh enough.
    # Disable after the event by commenting this line out.
    - cron: "*/5 * * * *"
  workflow_dispatch:   # also allows manual trigger from the Actions tab

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit leaderboard.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch leaderboard data
        env:
          # If your Liveheats event is private, add LIVEHEATS_TOKEN as a
          # GitHub Actions secret (repo Settings → Secrets → Actions).
          # For public events you can delete these two lines.
          LIVEHEATS_TOKEN: ${{ secrets.LIVEHEATS_TOKEN }}
        run: python fetch_leaderboard.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard.json docs/best_waves.csv
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update leaderboard $(date -u '+%H:%M UTC')"
          git push
